        <h1 class="text-2xl font-bold text-blue-900">{{dman}} </h1>

        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">📧</span>
          <input
            type="email"
            placeholder="Email address"
            value="{{eman}}"
            name="horse"
            required
            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:border-green-500 focus:ring-green-500"
          />
        </div>

        <div class="relative">
          <span class="absolute left-3 top-3 text-gray-400">🔒</span>
          <input
            type="password"
            placeholder="password"
            name="pig"
            required
            class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:border-green-500 focus:ring-green-500"
          />
        </div>

        <button
          id="loginBtn"
          type="submit"
          class="w-full bg-blue-900 hover:bg-blue-800 text-white py-2 rounded-xl shadow-md"

        </button>
